<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dino Game – Rôle A : Engine</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --surface:  #16213e;
      --panel:    #0f3460;
      --accent:   #e94560;
      --green:    #00ff88;
      --yellow:   #ffd700;
      --text:     #c8d6e5;
      --dim:      #546e7a;
      --mono:     'Courier New', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    /* ===== CANVAS WRAPPER ===== */
    #canvas-wrap {
      position: relative;
      border: 2px solid var(--panel);
      box-shadow: 0 0 30px rgba(233,69,96,.3);
    }

    canvas {
      display: block;
      background: var(--surface);
      image-rendering: pixelated;
    }

    /* ===== OVERLAY (start / game over) ===== */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,20,.82);
      gap: 12px;
    }
    #overlay.hidden { display: none; }

    #overlay-title {
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: var(--accent);
    }
    #overlay-score {
      font-size: 0.85rem;
      color: var(--yellow);
    }
    #overlay-hint {
      font-size: 0.72rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-top: 6px;
    }

    /* ===== HUD ===== */
    #hud {
      display: flex;
      gap: 32px;
      margin-top: 12px;
      font-size: 0.78rem;
      letter-spacing: 2px;
    }
    .hud-item span { color: var(--green); }

    /* ===== DEBUG PANEL ===== */
    #debug {
      margin-top: 18px;
      width: 100%;
      max-width: 700px;
      background: var(--surface);
      border: 1px solid var(--panel);
      padding: 12px 16px;
      font-size: 0.68rem;
      line-height: 1.9;
      color: var(--dim);
    }
    #debug .label { color: var(--accent); margin-right: 6px; }
    #debug .val   { color: var(--green); }

    /* ===== CONTROLS ===== */
    #controls {
      margin-top: 14px;
      font-size: 0.65rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>DINO ENGINE</h1>
<p class="subtitle">RÔLE A — PHYSICS &amp; COLLISION LAYER</p>

<div id="canvas-wrap">
  <canvas id="gameCanvas" width="700" height="200"></canvas>

  <div id="overlay">
    <div id="overlay-title">DINO RUNNER</div>
    <div id="overlay-score"></div>
    <div id="overlay-hint">[ ESPACE / ↑ ] POUR COMMENCER</div>
  </div>
</div>

<div id="hud">
  <div class="hud-item">SCORE&nbsp;<span id="h-score">0</span></div>
  <div class="hud-item">MEILLEUR&nbsp;<span id="h-best">0</span></div>
  <div class="hud-item">VITESSE&nbsp;<span id="h-speed">0</span></div>
  <div class="hud-item">OBSTACLES&nbsp;<span id="h-obs">0</span></div>
</div>

<div id="debug">
  <div><span class="label">DINO.y</span><span class="val" id="d-y">-</span> &nbsp;|&nbsp;
       <span class="label">DINO.vy</span><span class="val" id="d-vy">-</span> &nbsp;|&nbsp;
       <span class="label">ON_GROUND</span><span class="val" id="d-gr">-</span></div>
  <div><span class="label">OBSTACLES</span><span class="val" id="d-obs">-</span></div>
  <div><span class="label">COLLISION</span><span class="val" id="d-col">-</span></div>
  <div><span class="label">GAME_STATE</span><span class="val" id="d-state">IDLE</span></div>
</div>

<div id="controls">
  SAUTER : ESPACE / ↑ &nbsp;|&nbsp; MOBILE : TOUCHER L'ÉCRAN
</div>

<!-- ============================================================
     GAME ENGINE — TypeScript compilé inline (simulé en JS/TS)
     ============================================================ -->
<script>
"use strict";

// ─── TYPES (commentaires TS) ──────────────────────────────────────────────────
// interface Vec2 { x: number; y: number; }
// interface AABB { x: number; y: number; w: number; h: number; }
// type GameState = 'IDLE' | 'RUNNING' | 'DEAD';

// ─── CONSTANTES ───────────────────────────────────────────────────────────────
const CANVAS_W    = 700;
const CANVAS_H    = 200;
const GROUND_Y    = 160;          // y du sol (en px depuis le haut)
const GRAVITY     = 0.6;          // accélération gravitationnelle (px/frame²)
const JUMP_FORCE  = -13;          // vitesse initiale saut (négative = vers haut)
const BASE_SPEED  = 4;            // vitesse de défilement de départ
const SPEED_INC   = 0.0008;       // accélération progressive
const OBS_MIN_GAP = 300;          // espacement min entre obstacles
const OBS_MAX_GAP = 600;

// ─── ÉTAT GLOBAL ──────────────────────────────────────────────────────────────
/** @type {GameState} */
let gameState = 'IDLE';
let score       = 0;
let bestScore   = 0;
let frameCount  = 0;
let speed       = BASE_SPEED;
let obsCount    = 0;
let collisionThisFrame = false;

// ─── DINO ─────────────────────────────────────────────────────────────────────
const dino = {
  x:        60,
  y:        GROUND_Y - 40,     // position courante
  w:        30,
  h:        40,
  vy:       0,                  // vitesse verticale
  onGround: true,
  jump() {
    if (this.onGround) {
      this.vy = JUMP_FORCE;
      this.onGround = false;
    }
  },
  update() {
    // Physique : gravité
    this.vy += GRAVITY;
    this.y  += this.vy;

    // Collision sol
    const floor = GROUND_Y - this.h;
    if (this.y >= floor) {
      this.y       = floor;
      this.vy      = 0;
      this.onGround = true;
    }
  },
  /** @returns {AABB} */
  aabb() {
    // Hitbox légèrement réduite pour plus de fairplay
    return { x: this.x + 4, y: this.y + 4, w: this.w - 8, h: this.h - 4 };
  }
};

// ─── OBSTACLES ────────────────────────────────────────────────────────────────
/**
 * @typedef {{ x: number, y: number, w: number, h: number }} Obstacle
 * @type {Obstacle[]}
 */
let obstacles = [];
let nextObstacleIn = 200;   // frames avant prochain spawn

function spawnObstacle() {
  const h = 20 + Math.random() * 35;
  const w = 14 + Math.random() * 14;
  obstacles.push({
    x: CANVAS_W + 10,
    y: GROUND_Y - h,
    w,
    h
  });
  obsCount++;
  nextObstacleIn = OBS_MIN_GAP + Math.random() * (OBS_MAX_GAP - OBS_MIN_GAP);
}

function updateObstacles() {
  nextObstacleIn -= speed;
  if (nextObstacleIn <= 0) spawnObstacle();

  for (let i = obstacles.length - 1; i >= 0; i--) {
    obstacles[i].x -= speed;
    if (obstacles[i].x + obstacles[i].w < 0) {
      obstacles.splice(i, 1);
    }
  }
}

// ─── COLLISION (AABB) ─────────────────────────────────────────────────────────
/**
 * @param {AABB} a
 * @param {AABB} b
 * @returns {boolean}
 */
function aabbOverlap(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function checkCollisions() {
  const dinoBox = dino.aabb();
  for (const obs of obstacles) {
    if (aabbOverlap(dinoBox, obs)) {
      return true;
    }
  }
  return false;
}

// ─── DÉFILEMENT SOL (points visuels) ──────────────────────────────────────────
const groundDots = [];
for (let i = 0; i < 20; i++) {
  groundDots.push({ x: Math.random() * CANVAS_W, size: 1 + Math.random() });
}
function scrollGround() {
  for (const d of groundDots) {
    d.x -= speed;
    if (d.x < 0) d.x = CANVAS_W;
  }
}

// ─── NUAGES (décoration) ──────────────────────────────────────────────────────
const clouds = [
  { x: 100, y: 30, w: 60, h: 18 },
  { x: 320, y: 50, w: 80, h: 22 },
  { x: 550, y: 25, w: 55, h: 15 },
];
function scrollClouds() {
  for (const c of clouds) {
    c.x -= speed * 0.3;
    if (c.x + c.w < 0) c.x = CANVAS_W + 20;
  }
}

// ─── DESSIN ───────────────────────────────────────────────────────────────────
const canvas = /** @type {HTMLCanvasElement} */ (document.getElementById('gameCanvas'));
const ctx    = canvas.getContext('2d');

function draw() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Sol
  ctx.fillStyle = '#334155';
  ctx.fillRect(0, GROUND_Y, CANVAS_W, 2);

  // Texture sol (points)
  ctx.fillStyle = '#475569';
  for (const d of groundDots) {
    ctx.fillRect(d.x, GROUND_Y + 4, d.size, d.size);
  }

  // Nuages (rectangles)
  ctx.fillStyle = '#1e3a5f';
  for (const c of clouds) {
    ctx.fillRect(c.x, c.y, c.w, c.h);
  }

  // Obstacles
  for (const obs of obstacles) {
    ctx.fillStyle = '#e94560';
    ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
    // Contour
    ctx.strokeStyle = '#ff6b81';
    ctx.lineWidth   = 1;
    ctx.strokeRect(obs.x, obs.y, obs.w, obs.h);
  }

  // Dino (rectangle avec "tête")
  const col = collisionThisFrame ? '#ff0000' : '#00ff88';
  ctx.fillStyle = col;
  ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
  // "Œil" du dino
  ctx.fillStyle = '#000';
  ctx.fillRect(dino.x + dino.w - 10, dino.y + 6, 5, 5);

  // Hitbox debug (optionnel)
  const hb = dino.aabb();
  ctx.strokeStyle = 'rgba(255,255,0,.35)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);

  // Score à l'écran
  ctx.fillStyle   = '#546e7a';
  ctx.font        = '12px Courier New';
  ctx.textAlign   = 'right';
  ctx.fillText(`SCORE ${Math.floor(score)}`, CANVAS_W - 12, 20);
}

// ─── HUD & DEBUG ──────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('h-score').textContent  = Math.floor(score);
  document.getElementById('h-best').textContent   = Math.floor(bestScore);
  document.getElementById('h-speed').textContent  = speed.toFixed(2);
  document.getElementById('h-obs').textContent    = obsCount;

  document.getElementById('d-y').textContent   = dino.y.toFixed(1);
  document.getElementById('d-vy').textContent  = dino.vy.toFixed(2);
  document.getElementById('d-gr').textContent  = dino.onGround ? 'TRUE' : 'FALSE';
  document.getElementById('d-col').textContent = collisionThisFrame ? '⚠ HIT !' : 'CLEAR';
  document.getElementById('d-state').textContent = gameState;

  const obsStr = obstacles.map((o,i) => `#${i} x=${Math.floor(o.x)}`).join('  ');
  document.getElementById('d-obs').textContent = obsStr || '—';
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetGame() {
  dino.x        = 60;
  dino.y        = GROUND_Y - dino.h;
  dino.vy       = 0;
  dino.onGround = true;
  obstacles     = [];
  nextObstacleIn = 200;
  score          = 0;
  frameCount     = 0;
  speed          = BASE_SPEED;
  obsCount       = 0;
  collisionThisFrame = false;
}

// ─── OVERLAY ──────────────────────────────────────────────────────────────────
const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayScore = document.getElementById('overlay-score');
const overlayHint  = document.getElementById('overlay-hint');

function showOverlay(title, scoreText, hint) {
  overlayTitle.textContent = title;
  overlayScore.textContent = scoreText;
  overlayHint.textContent  = hint;
  overlay.classList.remove('hidden');
}
function hideOverlay() { overlay.classList.add('hidden'); }

// ─── BOUCLE PRINCIPALE ────────────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);

  if (gameState === 'RUNNING') {
    frameCount++;
    score += speed * 0.05;
    if (score > bestScore) bestScore = score;

    // Vitesse progressive
    speed = BASE_SPEED + frameCount * SPEED_INC;

    dino.update();
    updateObstacles();
    scrollGround();
    scrollClouds();

    collisionThisFrame = checkCollisions();
    if (collisionThisFrame) {
      gameState = 'DEAD';
      showOverlay('GAME OVER', `SCORE : ${Math.floor(score)}`, '[ ESPACE / ↑ ] REJOUER');
    }
  }

  draw();
  updateHUD();
}

// ─── ENTRÉES ──────────────────────────────────────────────────────────────────
function handleJump() {
  if (gameState === 'IDLE') {
    gameState = 'RUNNING';
    hideOverlay();
    dino.jump();
  } else if (gameState === 'RUNNING') {
    dino.jump();
  } else if (gameState === 'DEAD') {
    resetGame();
    gameState = 'RUNNING';
    hideOverlay();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') {
    e.preventDefault();
    handleJump();
  }
});

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  handleJump();
}, { passive: false });

canvas.addEventListener('click', handleJump);

// ─── DÉMARRAGE ────────────────────────────────────────────────────────────────
showOverlay('DINO RUNNER', '', '[ ESPACE / ↑ ] POUR COMMENCER');
gameLoop();
</script>
</body>
</html>
